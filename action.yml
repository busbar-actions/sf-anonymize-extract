name: 'Busbar Anonymize & Extract'
description: 'Extract data from a source Salesforce org, anonymize it, and load it into a target sandbox'
author: 'busbar.agency'
branding:
  icon: 'shuffle'
  color: 'green'

inputs:
  source-access-token:
    description: 'Access token for the SOURCE org (extract from). Provide via secret.'
    required: true
  source-instance-url:
    description: 'Instance URL for the SOURCE org.'
    required: true
  target-access-token:
    description: 'Access token for the TARGET org (load into). Provide via secret. Required unless dry-run=true.'
    required: false
    default: ''
  target-instance-url:
    description: 'Instance URL for the TARGET org. Required unless dry-run=true.'
    required: false
    default: ''

  config-file:
    description: 'Pipeline config (YAML): extraction mapping, anonymization rules, load settings.'
    required: true

  dry-run:
    description: 'Extract and anonymize but do NOT load into the target org.'
    required: false
    default: 'false'

  snapshot:
    description: 'Snapshot the target objects before load so the run can be rolled back.'
    required: false
    default: 'true'
  rollback-on-failure:
    description: 'If the load partially fails, surface the backup-id for MANUAL rollback (v1: no automated in-place restore).'
    required: false
    default: 'true'

  validate-residual-pii:
    description: 'Run the PII validator on the anonymized data BEFORE loading. Aborts the load if the threshold is breached.'
    required: false
    default: 'true'
  residual-pii-fail-on:
    description: 'Abort load if anonymized data still contains PII at or above this severity. Same scale as pii-scan.'
    required: false
    default: 'high'

  output-dir:
    description: 'Where extracted data, anonymized data, and the run report are written.'
    required: false
    default: '.busbar/pipeline-runs'

  upload-artifact:
    description: 'Upload the run report (NOT the data) as a workflow artifact.'
    required: false
    default: 'true'
  artifact-name:
    description: 'Artifact name when upload-artifact=true.'
    required: false
    default: 'pipeline-run'
  upload-data:
    description: 'Also upload the extracted+anonymized data as an artifact. Off by default — anonymized data can still be sensitive.'
    required: false
    default: 'false'

  version:
    description: 'sf-anonymize-extract release tag to download (e.g. v0.1.0). "latest" resolves the most recent release.'
    required: false
    default: 'latest'
  binary-repo:
    description: 'GitHub repo that publishes the sf-anonymize-extract binary releases.'
    required: false
    default: 'busbar-actions/actions-dist'

outputs:
  status:
    description: 'One of: success, dry-run, residual-pii-blocked, failed.'
    value: ${{ steps.run.outputs.status }}
  operation-id:
    description: 'Pipeline operation ID.'
    value: ${{ steps.run.outputs.operation-id }}
  backup-id:
    description: 'Snapshot/backup ID for MANUAL rollback (empty if no snapshot taken).'
    value: ${{ steps.run.outputs.backup-id }}
  records-extracted:
    description: 'Records extracted from the source org.'
    value: ${{ steps.run.outputs.records-extracted }}
  records-loaded:
    description: 'Records successfully loaded into the target org.'
    value: ${{ steps.run.outputs.records-loaded }}
  records-failed:
    description: 'Records that failed to load.'
    value: ${{ steps.run.outputs.records-failed }}
  residual-pii-count:
    description: 'PII findings remaining in the anonymized data at or above residual-pii-fail-on.'
    value: ${{ steps.run.outputs.residual-pii-count }}
  report-path:
    description: 'Path to the run report JSON.'
    value: ${{ steps.run.outputs.report-path }}

# The dedicated `sf-anonymize-extract` binary owns all logic and UX: it reads its
# inputs from INPUT_* (+ SF_SOURCE_*/SF_TARGET_* for the two orgs), runs
# extract → anonymize → residual-PII gate → snapshot → load, writes the report
# JSON, and emits GITHUB_OUTPUT / the step summary / annotations itself — exiting
# non-zero on residual-PII block or load failure. This action installs the binary,
# validates the dry-run/target invariant, maps inputs to env, and wires the
# artifact uploads. (Replaces the old `busbar-sf data pipeline` invocation.)
runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${{ inputs.dry-run }}" != "true" ]]; then
          if [[ -z "${{ inputs.target-access-token }}" || -z "${{ inputs.target-instance-url }}" ]]; then
            echo "::error::target-access-token and target-instance-url are required unless dry-run=true."
            exit 1
          fi
        fi

    - name: Set up sf-anonymize-extract
      uses: busbar-actions/setup@main
      with:
        binary: sf-anonymize-extract
        version: ${{ inputs.version }}
        binary-repo: ${{ inputs.binary-repo }}

    - name: Run pipeline
      id: run
      shell: bash
      env:
        # Two orgs, clearly separated: SF_SOURCE_* (read) and SF_TARGET_* (write).
        SF_SOURCE_ACCESS_TOKEN: ${{ inputs.source-access-token }}
        SF_SOURCE_INSTANCE_URL: ${{ inputs.source-instance-url }}
        SF_TARGET_ACCESS_TOKEN: ${{ inputs.target-access-token }}
        SF_TARGET_INSTANCE_URL: ${{ inputs.target-instance-url }}
        # Action inputs surfaced as the INPUT_* contract the binary reads.
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_OUTPUT_DIR: ${{ inputs.output-dir }}
        INPUT_REPORT_PATH: ${{ inputs.output-dir }}/report.json
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_SNAPSHOT: ${{ inputs.snapshot }}
        INPUT_ROLLBACK_ON_FAILURE: ${{ inputs.rollback-on-failure }}
        INPUT_VALIDATE_RESIDUAL_PII: ${{ inputs.validate-residual-pii }}
        INPUT_RESIDUAL_PII_FAIL_ON: ${{ inputs.residual-pii-fail-on }}
      run: sf-anonymize-extract

    - name: Upload run report
      if: always() && inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ steps.run.outputs.report-path }}
        if-no-files-found: ignore

    - name: Upload data artifact
      if: always() && inputs.upload-data == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}-data
        path: ${{ inputs.output-dir }}
        if-no-files-found: ignore
