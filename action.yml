name: 'Busbar Anonymize & Extract'
description: 'Extract data from a source Salesforce org, anonymize it, and load it into a target sandbox'
author: 'busbar.agency'
branding:
  icon: 'shuffle'
  color: 'green'

inputs:
  # ---- OIDC self-mint inputs (org instance URLs) ----
  # OIDC-first: the binary self-mints BOTH org sessions in-process from the
  # runner's GitHub OIDC id-token (busbar-auth `oidc_session_for`, bound per leg
  # to that org's instance URL) — no token is handed off. source-instance drives
  # the SOURCE leg (SF_SOURCE_INSTANCE_URL), target-instance the TARGET leg
  # (SF_TARGET_INSTANCE_URL). Each org must have Busbar installed and a trust
  # relationship established for this repo/workflow. The caller job MUST grant
  # `permissions: id-token: write`. The *-access-token inputs are a LOCAL-DEV
  # override only (when set, that leg skips OIDC and uses the raw token).
  source-instance:
    description: |
      Instance URL of the SOURCE org (a Salesforce org with Busbar installed and
      trust established), e.g. https://yourdomain.my.salesforce.com. Mapped to
      SF_SOURCE_INSTANCE_URL; the source session self-mints its own short-lived
      token via GitHub OIDC, bound to this org. Requires the caller job to grant
      `permissions: id-token: write`.
    required: false
    default: ''
  target-instance:
    description: |
      Instance URL of the TARGET org (a Salesforce org with Busbar installed and
      trust established). Mapped to SF_TARGET_INSTANCE_URL; the target session
      self-mints in-process via GitHub OIDC, bound to this org. Required unless
      dry-run=true (or supply target-instance-url for the local-dev token path).
    required: false
    default: ''

  eca-client-id:
    description: 'OPTIONAL override of the External Client App consumer key (client_id) for the OIDC exchange. PBO-pinned default; set only on a consumer-key rotation.'
    required: false
    default: ''
  token-handler:
    description: 'OPTIONAL override of the Apex token-exchange handler dev name. Defaults to BBGitHubTokenExchangeHandler.'
    required: false
    default: ''
  oidc-audience:
    description: 'OPTIONAL override of the audience requested in the GitHub OIDC token. Defaults to the source-instance URL.'
    required: false
    default: ''

  # ---- Local-dev token override (OPTIONAL; bypasses OIDC for that leg) ----
  # In steady state leave these EMPTY and let the binary self-mint via OIDC from
  # source-instance / target-instance. Set them only for local/manual runs where
  # you already hold a raw token; when present, that leg skips OIDC entirely.
  source-access-token:
    description: 'LOCAL-DEV ONLY: raw access token for the SOURCE org. Leave empty in CI — the source leg self-mints via OIDC from source-instance. When set, the source leg skips OIDC and uses this token.'
    required: false
    default: ''
  source-instance-url:
    description: 'LOCAL-DEV ONLY: SOURCE org instance URL paired with source-access-token. In CI use source-instance instead.'
    required: false
    default: ''
  target-access-token:
    description: 'LOCAL-DEV ONLY: raw access token for the TARGET org. Leave empty in CI — the target leg self-mints via OIDC from target-instance. When set, the target leg skips OIDC and uses this token.'
    required: false
    default: ''
  target-instance-url:
    description: 'LOCAL-DEV ONLY: TARGET org instance URL paired with target-access-token. In CI use target-instance instead.'
    required: false
    default: ''

  config-file:
    description: 'Pipeline config (YAML): extraction mapping, anonymization rules, load settings.'
    required: true

  dry-run:
    description: 'Extract and anonymize but do NOT load into the target org.'
    required: false
    default: 'false'

  snapshot:
    description: 'Snapshot the target objects before load so the run can be rolled back.'
    required: false
    default: 'true'
  rollback-on-failure:
    description: 'If the load partially fails, surface the backup-id for MANUAL rollback (v1: no automated in-place restore).'
    required: false
    default: 'true'

  validate-residual-pii:
    description: 'Run the PII validator on the anonymized data BEFORE loading. Aborts the load if the threshold is breached.'
    required: false
    default: 'true'
  residual-pii-fail-on:
    description: 'Abort load if anonymized data still contains PII at or above this severity. Same scale as pii-scan.'
    required: false
    default: 'high'

  output-dir:
    description: 'Where extracted data, anonymized data, and the run report are written.'
    required: false
    default: '.busbar/pipeline-runs'

  upload-artifact:
    description: 'Upload the run report (NOT the data) as a workflow artifact.'
    required: false
    default: 'true'
  artifact-name:
    description: 'Artifact name when upload-artifact=true.'
    required: false
    default: 'pipeline-run'
  upload-data:
    description: 'Also upload the extracted+anonymized data as an artifact. Off by default — anonymized data can still be sensitive.'
    required: false
    default: 'false'

  version:
    description: 'sf-anonymize-extract release tag to download (e.g. v0.1.0). "latest" resolves the most recent release.'
    required: false
    default: 'latest'
  binary-repo:
    description: 'GitHub repo that publishes the sf-anonymize-extract binary releases.'
    required: false
    default: 'busbar-actions/actions-dist'

outputs:
  status:
    description: 'One of: success, dry-run, residual-pii-blocked, failed.'
    value: ${{ steps.run.outputs.status }}
  operation-id:
    description: 'Pipeline operation ID.'
    value: ${{ steps.run.outputs.operation-id }}
  backup-id:
    description: 'Snapshot/backup ID for MANUAL rollback (empty if no snapshot taken).'
    value: ${{ steps.run.outputs.backup-id }}
  records-extracted:
    description: 'Records extracted from the source org.'
    value: ${{ steps.run.outputs.records-extracted }}
  records-loaded:
    description: 'Records successfully loaded into the target org.'
    value: ${{ steps.run.outputs.records-loaded }}
  records-failed:
    description: 'Records that failed to load.'
    value: ${{ steps.run.outputs.records-failed }}
  residual-pii-count:
    description: 'PII findings remaining in the anonymized data at or above residual-pii-fail-on.'
    value: ${{ steps.run.outputs.residual-pii-count }}
  report-path:
    description: 'Path to the run report JSON.'
    value: ${{ steps.run.outputs.report-path }}

# The dedicated `sf-anonymize-extract` binary owns all logic and UX: it reads its
# inputs from INPUT_* (+ SF_SOURCE_*/SF_TARGET_* for the two orgs), runs
# extract → anonymize → residual-PII gate → snapshot → load, writes the report
# JSON, and emits GITHUB_OUTPUT / the step summary / annotations itself — exiting
# non-zero on residual-PII block or load failure. This action installs the binary,
# validates the dry-run/target invariant, maps inputs to env, and wires the
# artifact uploads. (Replaces the old `busbar-sf data pipeline` invocation.)
runs:
  using: 'composite'
  steps:
    - name: Validate the source/target instance-URL invariant for the dry-run mode
      shell: bash
      run: |
        set -euo pipefail
        echo "Validating that a SOURCE instance URL is set (and a TARGET instance URL unless dry-run=true)"
        # OIDC-first: a SOURCE instance URL is always required (the binary
        # self-mints the source token from GitHub OIDC, bound to that org). The
        # access tokens are a local-dev override and are NOT required in CI.
        if [[ -z "${{ inputs.source-instance }}" && -z "${{ inputs.source-instance-url }}" ]]; then
          echo "::error::a SOURCE instance URL is required: set source-instance (OIDC self-mint) or source-instance-url (local-dev token path)."
          exit 1
        fi
        if [[ "${{ inputs.dry-run }}" != "true" ]]; then
          # A real load needs a TARGET instance URL; OIDC mints the target token.
          if [[ -z "${{ inputs.target-instance }}" && -z "${{ inputs.target-instance-url }}" ]]; then
            echo "::error::a TARGET instance URL is required unless dry-run=true: set target-instance (OIDC self-mint) or target-instance-url (local-dev token path)."
            exit 1
          fi
        fi

    - name: Install the sf-anonymize-extract binary from actions-dist
      uses: busbar-actions/setup@main
      with:
        binary: sf-anonymize-extract
        version: ${{ inputs.version }}
        binary-repo: ${{ inputs.binary-repo }}

    - name: Extract from the source Busbar-equipped org, anonymize, gate residual PII, and load into the target org
      id: run
      shell: bash
      env:
        # ---- Two orgs, clearly separated: SF_SOURCE_* (read) and SF_TARGET_* (write). ----
        # OIDC-first: the binary reads each leg's instance URL and self-mints that
        # leg's token in-process via GitHub OIDC (busbar-auth `oidc_session_for`),
        # bound to the org. The SF_*_ACCESS_TOKEN vars are a LOCAL-DEV override —
        # empty in CI, so the OIDC exchange runs; when set, that leg skips OIDC.
        SF_SOURCE_ACCESS_TOKEN: ${{ inputs.source-access-token }}
        SF_SOURCE_INSTANCE_URL: ${{ inputs.source-instance != '' && inputs.source-instance || inputs.source-instance-url }}
        SF_TARGET_ACCESS_TOKEN: ${{ inputs.target-access-token }}
        SF_TARGET_INSTANCE_URL: ${{ inputs.target-instance != '' && inputs.target-instance || inputs.target-instance-url }}
        # The OIDC config (ECA client id, Apex token handler, audience) is read
        # from these vars by busbar-auth's OidcExchangeConfig::from_env. It also
        # requires a non-empty SF_INSTANCE_URL to construct — oidc_session_for then
        # OVERRIDES the instance_url + audience per leg from the source/target URL,
        # so SF_INSTANCE_URL is just the required seed (set from the source org).
        SF_INSTANCE_URL: ${{ inputs.source-instance != '' && inputs.source-instance || inputs.source-instance-url }}
        ECA_CLIENT_ID: ${{ inputs.eca-client-id }}
        TOKEN_HANDLER_APEX: ${{ inputs.token-handler }}
        OIDC_AUDIENCE: ${{ inputs.oidc-audience }}
        # Action inputs surfaced as the INPUT_* contract the binary reads.
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_OUTPUT_DIR: ${{ inputs.output-dir }}
        INPUT_REPORT_PATH: ${{ inputs.output-dir }}/report.json
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_SNAPSHOT: ${{ inputs.snapshot }}
        INPUT_ROLLBACK_ON_FAILURE: ${{ inputs.rollback-on-failure }}
        INPUT_VALIDATE_RESIDUAL_PII: ${{ inputs.validate-residual-pii }}
        INPUT_RESIDUAL_PII_FAIL_ON: ${{ inputs.residual-pii-fail-on }}
      run: |
        set -euo pipefail
        echo "Running extract -> anonymize -> residual-PII gate ('${INPUT_RESIDUAL_PII_FAIL_ON}') -> load: source=${SF_SOURCE_INSTANCE_URL} target=${SF_TARGET_INSTANCE_URL} dry-run='${INPUT_DRY_RUN}' config='${INPUT_CONFIG_FILE}'"
        sf-anonymize-extract

    - name: Upload the anonymize-extract run report JSON as a workflow artifact
      if: always() && inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ steps.run.outputs.report-path }}
        if-no-files-found: error

    - name: Upload the extracted and anonymized data as a workflow artifact
      if: always() && inputs.upload-data == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}-data
        path: ${{ inputs.output-dir }}
        if-no-files-found: error
